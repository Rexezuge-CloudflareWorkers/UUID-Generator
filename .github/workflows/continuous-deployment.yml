name: Continuous Deployment

permissions:
  contents: read

on:
  workflow_run:
    workflows:
      - Continuous Integration
    branches:
      - main
    types:
      - completed
  repository_dispatch:
    types:
      - Upstream Sync Deployment
  workflow_dispatch:

concurrency:
  group: continuous-deployment-${{ github.event.workflow_run.head_branch || github.event.client_payload.branch || github.ref }}
  cancel-in-progress: false

jobs:
  deploy-worker:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    name: Deploy Cloudflare Worker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.event.client_payload.sha || github.sha }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install

      - name: Prepare Wrangler Configuration
        run: pnpm exec tsx scripts/prepare-wrangler-config.ts
        env:
          WRANGLER_JSONC: ${{ vars.WRANGLER_JSONC }}

      - name: Build Frontend App
        run: pnpm run buildApp

      - name: Deploy with Wrangler
        run: pnpm exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-pages:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    name: Deploy Cloudflare Pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.event.client_payload.sha || github.sha }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install

      - name: Prepare Wrangler Pages Configuration
        run: |
          if [ -n "${WRANGLER_PAGES_JSONC}" ]; then
            printf '%s\n' "${WRANGLER_PAGES_JSONC}" > wrangler.pages.jsonc
          else
            cp wrangler.pages.jsonc.template wrangler.pages.jsonc
          fi
        env:
          WRANGLER_PAGES_JSONC: ${{ vars.WRANGLER_PAGES_JSONC }}

      - name: Stage Pages Config as Default Wrangler Config
        run: cp wrangler.pages.jsonc wrangler.jsonc

      - name: Build Frontend App
        run: pnpm run buildApp

      - name: Validate Pages Configuration
        run: |
          if [ -z "${CLOUDFLARE_PAGES_PROJECT_NAME}" ]; then
            printf '%s\n' "CLOUDFLARE_PAGES_PROJECT_NAME repository variable is required"
            exit 1
          fi
        env:
          CLOUDFLARE_PAGES_PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}

      - name: Deploy with Wrangler Pages
        run: |
          pnpm exec wrangler pages deploy \
            --project-name "${CLOUDFLARE_PAGES_PROJECT_NAME}" \
            --branch "${DEPLOY_BRANCH}" \
            --commit-hash "${DEPLOY_SHA}" \
            --commit-message "$(git log -1 --pretty=%s)"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}
          DEPLOY_BRANCH: ${{ github.event.workflow_run.head_branch || github.event.client_payload.branch || github.ref_name }}
          DEPLOY_SHA: ${{ github.event.workflow_run.head_sha || github.event.client_payload.sha || github.sha }}
